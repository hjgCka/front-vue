<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>User Input</title>
		<script src="../vue.js"></script>
	</head>
	<body>
		<div id="app-5">
		  <p>{{ message }}</p>
		  <button v-on:click="reverseMessage">反转消息</button>
		</div>
		
		<div id="app-6">
		  <p>{{ message }}</p>
		  <input v-model="message">
		</div>
		
		<script>
			var app5 = new Vue({
				el: '#app-5',
				data: {
					message: 'Hello Vue.js'
				},
				methods: {
					reverseMessage: function () {
						this.message = this.message.split('').reverse().join('');
					}
				}
			});
			
			var app6 = new Vue({
				el: '#app-6',
				data: {
					message: 'hello vue!'
				}
			});
		</script>
	</body>
</html>
