<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../vue.js"></script>
	</head>
	<body>
		<div id = "root">
			<h2 :style="{opacity : opacity}">欢迎学习vue</h2>
		</div>
	</body>
	
	<script>
		Vue.config.productionTip = false
		
		new Vue({
			el: '#root',
			data: {
				opacity: 1
			},
			methods: {
				change() {
					setInterval(() => {
						this.opacity -= 0.01
						if (this.opacity <= 0) {
							this.opacity = 1
						}
					}, 16);
				}
			},
			//vue完成模板的解析并把真实的DOM元素放入页面后调用mounted
			mounted() {
				setInterval(() => {
					this.opacity -= 0.01
					if (this.opacity <= 0) {
						this.opacity = 1
					}
				}, 16);
			}
		})

		//通过外部的定时器实现
		/* setInterval(() => {
			vm.opacity -= 0.01
			if (vm.opacity <= 0) {
				vm.opacity = 1
			}
		}, 16); */
	</script>
</html>
