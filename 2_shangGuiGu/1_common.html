<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../vue.js"></script>
	</head>
	<body>
		<div id = "root">
			<h2>欢迎来到{{name}}</h2>
		</div>
	</body>
	
	<script>
		Vue.config.productionTip = false
		
		const vm = new Vue({
			el: '#root',
			data: {
				name: '尚硅谷'
			}
		})
	</script>
</html>
