<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../vue.js"></script>
	</head>
	<body>
		<div id = "root">
			<h1>插值语法</h1>
			<h3>你好，{{name}}</h3>
			
			<h1>指令语法</h1>
			<a v-bind:href="url" v-bind:x="x">点我去尚硅谷1</a>
			<a :href="url.toUpperCase()" v-bind:x="x">点我去尚硅谷2</a>
			<a :href="url.toUpperCase()" :x="x">点我去尚硅谷3</a>
		</div>
	</body>
	
	<script>
		Vue.config.productionTip = false
		Vue.config.devtools = false
		
		new Vue({
			el: '#root',
			data: {
				name: 'Jack',
				url: 'https://www.atguigu.com',
				x: 'Hello'
			}
		})
	</script>
</html>
