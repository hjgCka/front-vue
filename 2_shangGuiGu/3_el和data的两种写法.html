<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../vue.js"></script>
	</head>
	<body>
		<div id = "root">
			<h1>你好，{{name}}</h1>
		</div>
	</body>
	
	<script>
		Vue.config.productionTip = false
		
		var vm = new Vue({
			//el: '#root',
			
			/* data: {
				name: '尚硅谷'
			} */
			
			//data的两种写法，还有函数式写法。这里可以用es6的对象简写形式
			data(){
			//data: function() {
				//此处的this是Vue实例对象，如果用箭头函数那么它的this就是window
				return {
					name: '尚硅谷'
				}
			}
		})
		
		setTimeout(() => {
			vm.$mount('#root')
		}, 1000)
		
		
		
	</script>
</html>
