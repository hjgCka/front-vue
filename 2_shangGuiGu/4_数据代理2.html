<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../vue.js"></script>
	</head>
	<body>
		<div id = "root">
			
		</div>
	</body>
	
	<script>
		Vue.config.productionTip = false
		Vue.config.devtools = false
		
		let obj1 = {x:100}
		let obj2 = {y:200}
		Object.defineProperty(obj2, 'x', {
			get() {
				return obj1.x
			},
			set(value) {
				obj1.x = value
			}
		})
	</script>
</html>
