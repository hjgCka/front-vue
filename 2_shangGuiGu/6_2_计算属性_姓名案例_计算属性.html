<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../vue.js"></script>
	</head>
	<body>
		<div id = "root">
			姓：<input type="text" v-model="firstName"/><br />
			名：<input type="text" v-model="lastName"/><br />
			
			<!-- 全名：<span>{{firstName.slice(0, 3) + '-' + lastName}}</span> -->
			
			<!-- 这个插值语法是调用方法，并不是直接访问数据，因此加上()表示方法调用 -->
			<!-- 全名：<span>{{fullName()}}</span> -->
			
			<!-- 计算属性会被缓存，只会计算一次，其它地方使用计算属性时从缓存拿到 -->
			全名：<span>{{fullName2}}</span>
		</div>
	</body>
	
	<script>
		Vue.config.productionTip = false
		Vue.config.devtools = false
		
		const vm = new Vue({
			el: '#root',
			data: {
				//这里数据发生变化时，vue模板都会重新解析一遍(el指向的元素)，所以fullName方法会重新调用
				firstName: '张',
				lastName: '三'
			},
			methods: {
				fullName() {
					//return '小猪佩奇'
					return this.firstName + '-' + this.lastName
				}
			},
			computed: {
				fullName2: {
					get() {
						//1, 当初次读取fullName时，该方法会被调用，返回值作为fullName的值
						//2, 依赖的数据发生变化时，读取fullName时，该方法也会被调用
						console.log('xxx')
						return this.firstName + '-' + this.lastName
					},
					set(newFullName) {
						//当fullName被修改时，才会被调用
						const array = newFullName.split('-');
						this.firstName = array[0]
						this.lastName = array[1]
					}
				},
				
				//当只有get而没有set时，可以进行简写
				fullName3() {
					return this.firstName + '-' + this.lastName
				}
			}
		})
	</script>
</html>
