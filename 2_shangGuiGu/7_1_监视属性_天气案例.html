<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../vue.js"></script>
	</head>
	<body>
		<div id = "root">
			<h2>今天天气很{{info}}</h2>
			<button @click="changeWeather">切换</button>
		</div>
	</body>
	
	<script>
		Vue.config.productionTip = false
		
		const vm = new Vue({
			el: '#root',
			data: {
				isHot: true
			},
			methods: {
				changeWeather() {
					this.isHot = !this.isHot
				}
			},
			computed: {
				info() {
					return this.isHot?'炎热':'凉爽'
				}
			}
		})
	</script>
</html>
