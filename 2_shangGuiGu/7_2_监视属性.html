<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../vue.js"></script>
	</head>
	<body>
		<div id = "root">
			<h2>今天天气很{{info}}</h2>
			<button @click="changeWeather">切换</button>
		</div>
	</body>
	
	<script>
		Vue.config.productionTip = false
		
		const vm = new Vue({
			el: '#root',
			data: {
				isHot: true
			},
			methods: {
				changeWeather() {
					this.isHot = !this.isHot
				}
			},
			computed: {
				info() {
					return this.isHot?'炎热':'凉爽'
				}
			},
			watch: {
				isHot: {
					//初始化时让handler调用一下
					immediate: true,
					//isHot被修改时会被调用
					handler(newValue, oldValue) {
						console.log('isHot被修改了', newValue, oldValue)
					}
				},
				/*同时可以监听 计算属性*/
				// info: {
				// 	//初始化时让handler调用一下
				// 	immediate: true,
				// 	//info被修改时会被调用
				// 	handler(newValue, oldValue) {
				// 		console.log('info被修改了', newValue, oldValue)
				// 	}
				// }
			}
		})

		vm.$watch('info', {
			//初始化时让handler调用一下
			immediate: true,
			//info被修改时会被调用
			handler(newValue, oldValue) {
				console.log('info被修改了', newValue, oldValue)
			}
		})
	</script>
</html>
