<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../vue.js"></script>
	</head>
	<body>
		<div id = "root">
			<h2>今天天气很{{info}}</h2>
			<button @click="changeWeather">切换</button>
			<hr/>

			<h3>a的值是{{numbers.a}}</h3>
			<button @click="numbers.a++">点我让a+1</button>

			<h3>b的值是{{numbers.b}}</h3>
			<button @click="numbers.b++">点我让b+1</button>
		</div>
	</body>
	
	<script>
		Vue.config.productionTip = false
		
		const vm = new Vue({
			el: '#root',
			data: {
				isHot: true,
				numbers: {
					a:1,
					b:1
				}
			},
			methods: {
				changeWeather() {
					this.isHot = !this.isHot
				}
			},
			computed: {
				info() {
					return this.isHot?'炎热':'凉爽'
				}
			},
			watch: {
				isHot: {
					//初始化时就让handler调用一下
					//immediate: true,
					//isHot被修改时会被调用
					handler(newValue, oldValue) {
						console.log('isHot被修改了', newValue, oldValue)
					}
				},
				/*同时可以监听 计算属性*/
				info: {
					//初始化时让handler调用一下
					immediate: true,
					//info被修改时会被调用
					handler(newValue, oldValue) {
						console.log('info被修改了', newValue, oldValue)
					}
				},
				//监视多级结构中，某个属性的变化
				// 'numbers.a': {
				// 	handler(newValue, oldValue) {
				// 		console.log('number.a被修改了', newValue, oldValue)
				// 	}
				// }
				numbers: {
					//开启深度监视的配置
					deep: true,
					handler(newValue, oldValue) {
						console.log('numbers被修改了', newValue, oldValue)
					}
				}
			}
		})
	</script>
</html>
