<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../vue.js"></script>
	</head>
	<body>
		<div id = "root">
			<form @submit.prevent="demo">
				<label for="account">账号：</label>
				<input type="text" id="account" v-model="account"/><br/>
				<label for="pwd">密码：</label>
				<input type="password" id="pwd" v-model="password"/><br/>

				性别：
				男<input type="radio" name="sex" v-model="sex" value="male"/> 
				女<input type="radio" name="sex" v-model="sex" value="female"/><br/>

				爱好：
				学习<input type="checkbox" v-model="hobby" value="study">
				 打游戏<input type="checkbox" v-model="hobby" value="game">
				  吃饭<input type="checkbox" v-model="hobby" value="eat"><br/>

				所属校区：
				<select v-model="city">
					<option value="">请选择校区</option>
					<option value="北京">北京</option>
					<option value="上海">上海</option>
					<option value="深圳">深圳</option>
					<option value="武汉">武汉</option>
				</select>
				<br/>

				其它信息：
				<textarea v-model="other"></textarea><br/>

				<input type="checkbox" v-model="agree"/>阅读并接受
				<a href="https://www.atguigu.com">用户协议</a>
				<!-- 点击按钮引起表单提交，之后默认的动作是跳转页面-->
				<button type="submit">提交</button>
			</form>
		</div>
	</body>
	
	<script>
		Vue.config.productionTip = false
		
		const vm = new Vue({
			el: '#root',
			data: {
				account: '',
				password: '',
				sex: 'female',
				hobby: [],
				city: '',
				other: '',
				agree: ''
			},
			methods: {
				demo() {
					//this._data也行
					console.log(this.$data)
				}
			}
		})
	</script>
</html>
