<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../../vue.js"></script>
	</head>
	<!--
	     :key需要绑定到一个唯一值，不然新增li时会有问题。
		 虚拟dom的对比算法要用到key，如果用id之类数据，会更加高效（复用真实dom）且不会出错。
	-->
	<body>
		<div id = "root">
			<h2>人员列表</h2>
			<button @click.once="addMember">添加一个老刘</button>
			<ul>
				<li v-for="(person, index) in persons" :key="index">
					{{person.name}} - {{person.age}}
					<input type="text"/>
				</li>
			</ul>
		</div>
	</body>
	
	<script>
		Vue.config.productionTip = false
		
		const vm = new Vue({
			el: '#root',
			data: {
				persons: [
					{id:'001', name:'张三', age:18},
					{id:'002', name:'李四', age:19},
					{id:'003', name:'王五', age:20}
				]
			},
			methods: {
				addMember() {
					const p = {id:'004', name:'老刘', age: 22}
					this.persons.unshift(p)
				}
			},
		})
	</script>
</html>
