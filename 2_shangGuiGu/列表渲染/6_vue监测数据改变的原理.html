<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../../vue.js"></script>
	</head>
	<body>
		<div id = "root">
			<h2>学校名称：{{name}}</h2>
			<h2>学校地址：{{address}}</h2>
		</div>
	</body>
	
	<script>
		Vue.config.productionTip = false

		//计算属性实现
		const vm = new Vue({
			el: '#root',
			data: {
				name: '尚硅谷',
				address: '北京'
			}
		})
	</script>
</html>
