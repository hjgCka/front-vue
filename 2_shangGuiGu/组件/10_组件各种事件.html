<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../../vue.js"></script>
	</head>
	<body>
		<div id = "root">
			<!--使用组件标签，这种方式此时是正常双向绑定了-->
			<school v-model="schoolInput"></school>
			<hr/>
			
            <!-- <student></student>
			<hr/>

			<hello></hello> -->
		</div>
	</body>
	
	<script>
		Vue.config.productionTip = false

		const school = Vue.extend({
            // $emit的第一个参数其实可以随便定义，但是为了明确语义使用input
			template: `
				<div>
					<input
                        v-bind:value="value"
                        v-on:input="$emit('cck', $event.target.value)"
                    >
				</div>
			`,
            props: ['value'],
		})

		const student = Vue.extend({
			template: `
				<div>
					<h2>学生姓名：{{studentName}}</h2>
					<h2>学生年龄：{{age}}</h2>
				</div>
			`,
			data() {
				return {
					studentName: 'Jack',
					age: 20
				}
			}
		})

		const hello = Vue.extend({
			template:`
				<div>
					<h2>你好，{{name}}</h2>
				</div>
			`,
			data() {
				return {name: 'Tom'}
			}
		})
		//全局注册
		Vue.component('hello', hello)
		
		const vm = new Vue({
			el: '#root',
            data: {
                schoolInput: 'Jack'
            },
			//局部注册组件
			components: {
				school: school,
				student: student
			}
		})
	</script>
</html>
