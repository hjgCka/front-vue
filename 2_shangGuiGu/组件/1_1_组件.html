<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../../vue.js"></script>
	</head>
	<body>
		<div id = "components-demo">
			<button-counter></button-counter>

            <blog-post id="1" title="My journey with Vue"></blog-post>
            <blog-post id="2" title="Blogging with Vue"></blog-post>
            <blog-post id="3" title="Why Vue is so fun"></blog-post>
		</div>
        <hr/>

        <div id="blog-post-demo">
            <blog-post
                v-for="post in posts"
                v-bind:id="post.id"
                v-bind:key="post.id"
                v-bind:title="post.title"
            ></blog-post>
        </div>
        <hr/>

        <div id="blogs">
            <blog-post2
                v-for="post in posts"
                v-bind:key="post.id"
                v-bind:id="post.id+1"
                v-bind:post="post"
            ></blog-post2>
        </div>
	</body>
	
	<script>
		Vue.config.productionTip = false

		// 定义一个名为 button-counter 的新组件
        Vue.component('button-counter', {
            data: function () {
                return {
                    count: 0
                }
            },
            template: '<button v-on:click="count++">You clicked me {{ count }} times.</button>'
        })

        Vue.component('blog-post', {
            props: ['title'],
            template: '<h3>{{ title }}</h3>'
        })

        Vue.component('blog-post2', {
            props: ['post'],
            template: `
                    <div>
                        <h3>{{ post.title }}</h3>
                        <div v-html="post.content"></div>
                    </div>
                `
        })
		
		const vm1 = new Vue({
			el: '#components-demo'
		})

        const vm2 = new Vue({
            el: '#blog-post-demo',
            data: {
                posts: [
                    { id: 1, title: 'My journey with Vue' },
                    { id: 2, title: 'Blogging with Vue' },
                    { id: 3, title: 'Why Vue is so fun' }
                ]
            }
        })

        const vm3 = new Vue({
            el: '#blogs',
            data: {
                posts: [
                    { id: 1, title: 'My journey with Vue', content: 'abc' },
                    { id: 2, title: 'Blogging with Vue', content: 'edf' },
                    { id: 3, title: 'Why Vue is so fun', content: 'gsf' }
                ]
            }
        })
	</script>
</html>
