<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../../vue.js"></script>
	</head>
	<body>
		<!--
		1. school组件本质是一个名为VueComponent的构造函数，是Vue.extend生成的。
		2. 使用<school>标签，Vue解析时会帮我们创建school组件的实例对象。
			即Vue帮我们执行了new VueComponent(options)

		3. 每次调用Vue.extend时，返回的都是一个全新的VueComponent。

		4. this指向
			组件配置中，data函数dent dent，它的this都是VueComponent实例对象。
			而new Vue的配置中，this都是指向Vue实例。

		5. VueComponent实例对象，以后简称vc（也可称之为，组件实例对象）。
		-->
		<div id = "root">
			<school></school>
			<hello></hello>
		</div>
	</body>
	
	<script>
		Vue.config.productionTip = false

		const school = Vue.extend({
			template: `
				<div>
					<h2>学校名称：{{name}}</h2>
					<h2>学校地址：{{address}}</h2>
				</div>
			`,
			data() {
				return {
					name: '尚硅谷',
					address: '北京'
				}
			}
		})

		const hello = Vue.extend({
			template: `<h2>{{msg}}</h2>`,
			data() {
				return {
					msg: 'hello'
				}
			}
		})

		console.log('school', school)
		console.log('hello', hello)

		const vm = new Vue({
			el: '#root',
			components: {
				school: school,
				hello: hello
			}
		})
	</script>
</html>
