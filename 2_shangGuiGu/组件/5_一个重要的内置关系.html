<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../../vue.js"></script>
	</head>
	<body>
		<div id = "root">
			<school></school>
		</div>
	</body>
	
	<script>
		//定义一个构造函数
		function Demo() {
			this.a = 1
			this.b = 2
		}

		//创建实例对象
		const b = new Demo()
		console.log(Demo.prototype)
		console.log(b.__proto__)

		Vue.config.productionTip = false

		Vue.prototype.x = 99

		const school = Vue.extend({
			template: `
				<div>
					<h2>学校名称：{{name}}</h2>
					<h2>学校地址：{{address}}</h2>
					<button @click="showX">点我输出x</button>
				</div>
			`,
			data() {
				return {
					name: '尚硅谷',
					address: '北京'
				}
			},
			methods: {
				showX() {
					//this是school的实例对象vc，到Vue的原型对象上找到了x
					console.log(this.x)
				}
			}
		})

		const vm = new Vue({
			el: '#root',
			data: {
				msg: '你好'
			},
			components: {
				school: school
			}
		})

		//school是VueComponent构造函数，它的原型对象的原型对象并不是指向Object原型对象。
		//而是指向Vue的原型对象。
		//这样如果在Vue原型对象上添加方法和属性，组件实例对象就能够去使用了。
		console.log(school.prototype.__proto__ === vm.__proto__)
	</script>
</html>
