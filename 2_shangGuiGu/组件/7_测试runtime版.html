<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../../vue.runtime.js"></script>
	</head>
	<body>
		<div id = "root">
			<!-- <h1>{{name}}</h1> -->
		</div>
	</body>
	
	<script>
		// 使用runtime版本会报错，因为html需要运行时的模板编译功能。
		// 而这个版本的js不包含模板编译器。
		// 要么使用render函数，要么使用完整版本的vue。
		const vm = new Vue({
			el: '#root',
			data() {
				return {
					name: '你好'
				}
			},
			// render中使用箭头函数时，this是window
			render(createElement) {
				return createElement('h1', this.name)
			}
		})
	</script>
</html>
