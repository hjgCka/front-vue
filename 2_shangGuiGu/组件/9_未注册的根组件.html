<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>vue</title>
		<script src="../../vue.js"></script>
	</head>
	<body>
		<div id = "root">
		</div>
	</body>
	
	<script>
		Vue.config.productionTip = false

		const ah = Vue.extend({
			name: 'anchored-heading',
			render: function (createElement) {
				return createElement(
					'h' + this.level,   // 标签名称
					this.title
				)
			},
			data() {
				return {
					level: 1,
					title: 'Hello world'
				}
			}
		})
		
		const vm = new Vue({
			el: '#root',
			render: createElement => createElement(ah)
		})
	</script>
</html>
