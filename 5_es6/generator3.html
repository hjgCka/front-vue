<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Generator3</h1>
</body>
<script>
    // for/of 和 ...操作符，都会忽略done:true的元素，但是我们可以手动获取
    function* oneAndDone() {
        yield 1;
        return "Done";
    }

    // 只显示1
    console.log([...oneAndDone()]);

    let g = oneAndDone();
    // done:false, value:'1'
    console.log(g.next());
    // done:true, value:'done'
    console.log(g.next());
    // 后面调用多少次，都是 done:true, value:undefined
    console.log(g.next());


    // 调用next()时，回送参数
    function* smallNumbers() {
        console.log("next()第一次调用，参数被丢弃");
        let y1 = yield 1;

        console.log("next()第二次调用，参数是 ", y1);
        let y2 = yield 2;

        console.log("next()第三次调用，参数是 ", y2);
        let y3 = yield 3;

        console.log("next()第四次调用，参数是 ", y3);
        return 4;
    }

    let sn = smallNumbers();
    console.log("创建了生成器，代码未运行");

    let n1 = sn.next("a");
    console.log("生成器回送 ", n1.value)
    let n2 = sn.next("b");
    console.log("生成器回送 ", n2.value)
    let n3 = sn.next("c");
    console.log("生成器回送 ", n3.value)
    let n4 = sn.next("d");
    console.log("生成器回送 ", n4.value)

</script>
</html>
